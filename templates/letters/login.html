<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Cloud R tech HR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #C94B1A;
      --brand-dark:  #A33A12;
      --brand-light: #F7EDE7;
      --brand-mid:   #E8C4A8;
      --ink:         #1A1210;
      --ink-2:       #4A3F3A;
      --ink-3:       #8A7A74;
      --surface:     #FDFAF8;
      --white:       #FFFFFF;
      --border:      #EDE4DE;
      --shadow-sm:   0 1px 3px rgba(201,75,26,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg:   0 12px 40px rgba(201,75,26,.12), 0 4px 12px rgba(0,0,0,.08);
      --radius:      12px;
      --radius-sm:   8px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }

    /* Subtle branded background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,75,26,.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(201,75,26,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
      position: relative;
      z-index: 1;
    }

    /* Brand bar at top */
    .brand-bar {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-bar img {
      max-height: 64px;
      max-width: 200px;
      object-fit: contain;
    }
    .brand-bar .brand-name {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }
    .brand-bar .logo-dot {
      width: 32px; height: 32px;
      background: var(--brand);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-bar .brand-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -.3px;
    }
    .brand-bar .brand-text em {
      color: var(--brand);
      font-style: italic;
    }

    /* Card */
    .login-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 36px 36px 32px;
      box-shadow: var(--shadow-lg);
    }

    .card-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--brand);
      background: var(--brand-light);
      border: 1px solid var(--brand-mid);
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 14px;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.55rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -.3px;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 7px;
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--surface);
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 18px;
    }
    input[type=text]:focus,
    input[type=password]:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(201,75,26,.1);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      margin-top: 4px;
      letter-spacing: .2px;
    }
    .btn-login:hover  { background: var(--brand-dark); box-shadow: var(--shadow-sm); }
    .btn-login:active { transform: scale(.98); }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--ink-3);
      margin-top: 20px;
      font-weight: 300;
    }

    @media (max-width: 480px) {
      .login-card { padding: 28px 22px 24px; }
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="brand-bar">
    <div class="brand-name">
      <div class="logo-dot">☁</div>
      <span class="brand-text">Cloud R <em>tech</em></span>
    </div>
  </div>

  <div class="login-card">
    <div class="card-eyebrow">🔒 Secure Access</div>
    <h1 class="card-title">HR Portal Login</h1>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="post" action="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

      <button class="btn-login" type="submit">Sign In →</button>
    </form>
  </div>

  <p class="footer-note">Authorised personnel only &nbsp;·&nbsp; Cloud R tech</p>
</div>
</body>
</html>
