{% extends "letters/base.html" %}
{% block title %}Appraisal Letter - Cloud R tech{% endblock %}
{% block content %}
<a class="back-link" href="/">← Back to Dashboard</a>
<div class="card">
  <h1>Appraisal Letter</h1>
  <form id="dl-form" method="post" action="/generate/appraisal/">
    {% csrf_token %}
    <div class="form-grid">

      <div class="form-group">
        <label>Employee Name</label>
        <input type="text" name="name" placeholder="Jestin Rosariyo L" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select name="gender" required>
          <option value="male">Male (Mr.)</option>
          <option value="female">Female (Ms.)</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Address</label>
        <textarea name="address" placeholder="61, West Street Pudhunagar, Pudhukkottai." required></textarea>
      </div>

      <div class="form-group">
        <label>Pincode</label>
        <input type="text" name="pincode" placeholder="613301" required>
      </div>

      <div class="form-group">
        <label>Letter Date</label>
        <div class="date-wrap">
          <input type="date" id="date_picker" class="date-picker">
          <input type="text" id="date_display" name="date" placeholder="May 10, 2026" required>
        </div>
      </div>

      <hr class="form-divider">

      <div class="form-group">
        <label>Current Monthly CTC (INR)</label>
        <input type="number" name="current_monthly" placeholder="15000" min="1" required>
      </div>

      <div class="form-group">
        <label>New Monthly CTC after Increment (INR)</label>
        <input type="number" id="new_monthly" name="new_monthly" placeholder="18000" min="1" required>
      </div>

      <div class="form-group">
        <label>Designation</label>
        <div id="desg-wrap" class="cdd-wrap"></div>
        <input type="hidden" id="designation-val" name="designation" required>
      </div>

      <div class="form-group">
        <label>Annual CTC <span class="auto-badge">auto-calculated</span></label>
        <input type="text" id="ctc_lpa" name="ctc_lpa" placeholder="Fills from New Monthly CTC" readonly>
      </div>

    </div>
    <div class="btn-group">
      <button class="btn-generate" type="button" onclick="submitForm('/generate/appraisal/')">
        📄&nbsp; Download PDF
      </button>
      <button class="btn-generate-docx" type="button" onclick="submitForm('/generate/appraisal/docx/')">
        📝&nbsp; Download DOCX
      </button>
    </div>
    <script>
      function submitForm(url) {
        var form = document.getElementById('dl-form');
        form.action = url;
        form.submit();
      }
    </script>
  </form>
</div>

<script>
  initCDD({
    wrap:        document.getElementById('desg-wrap'),
    hiddenInput: document.getElementById('designation-val'),
    sessionKey:  'designations',
    placeholder: '— Select Designation —',
  });

  function toTitleCase(str) {
    return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1));
  }
  function bindTitleCase(name) {
    document.querySelectorAll(`[name="${name}"]`).forEach(el => {
      el.addEventListener('blur', () => { if (el.value) el.value = toTitleCase(el.value); });
    });
  }

  function validateAddress(el) {
    if (!el.value) return;
    const v = el.value.trim();
    const valid = /^[^,\.]+(?:,\s[^,\.]+)*\.$/.test(v);
    let err = el.parentElement.querySelector('.addr-err');
    if (!valid) {
      if (!err) {
        err = document.createElement('p');
        err.className = 'addr-err';
        err.style.cssText = 'color:#b91c1c;font-size:0.8rem;margin-top:5px;font-family:inherit;';
        el.parentElement.appendChild(err);
      }
      err.textContent = '⚠ Format must be: 61, West Street, Pudhunagar, Pudhukkottai.  (comma-space between parts, ends with full stop)';
      el.style.borderColor = '#ef4444';
      el.style.boxShadow = '0 0 0 3px rgba(239,68,68,.15)';
    } else {
      if (err) err.remove();
      el.style.borderColor = '';
      el.style.boxShadow = '';
    }
  }
  const addrField = document.querySelector('[name="address"]');
  if (addrField) {
    addrField.addEventListener('blur',  () => validateAddress(addrField));
    addrField.addEventListener('input', () => {
      const err = addrField.parentElement.querySelector('.addr-err');
      if (err) err.remove();
      addrField.style.borderColor = '';
      addrField.style.boxShadow = '';
    });
  }
  ['name', 'address'].forEach(bindTitleCase);

  function formatMonthDayYear(s) {
    const d = new Date(s + 'T00:00:00');
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  const picker  = document.getElementById('date_picker');
  const display = document.getElementById('date_display');
  picker.addEventListener('change', () => { display.value = formatMonthDayYear(picker.value); });
  display.addEventListener('input',  () => { picker.value = ''; });

  const newMonthly = document.getElementById('new_monthly');
  const ctcLpa     = document.getElementById('ctc_lpa');
  newMonthly.addEventListener('input', () => {
    const m = parseFloat(newMonthly.value);
    ctcLpa.value = (!isNaN(m) && m > 0) ? (m * 12 / 100000).toFixed(2) : '';
  });
</script>
{% endblock %}
