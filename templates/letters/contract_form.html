{% extends "letters/base.html" %}
{% block title %}Contract Extension - Cloud R tech{% endblock %}
{% block content %}
<a class="back-link" href="/">← Back to Dashboard</a>
<div class="card">
  <h1>Contract Extension Letter</h1>
  <form id="dl-form" method="post" action="/generate/contract/">
    {% csrf_token %}
    <div class="form-grid">

      <div class="form-group">
        <label>Reference No.</label>
        <input type="text" id="ref-input" name="ref" placeholder="CRT001" required>
      </div>

      <div class="form-group">
        <label>Employee Name</label>
        <input type="text" name="name" placeholder="Jestin Rosariyo L" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select name="gender" required>
          <option value="male">Male (Mr.)</option>
          <option value="female">Female (Ms.)</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Address</label>
        <textarea name="address" placeholder="61, West Street Pudhunagar, Pudhukkottai." required></textarea>
      </div>

      <div class="form-group">
        <label>Pincode</label>
        <input type="text" name="pincode" placeholder="613301" required>
      </div>

      <div class="form-group">
        <label>Contract Extended Till</label>
        <div class="date-wrap">
          <input type="date" id="extended_picker" class="date-picker">
          <input type="text" id="extended_display" name="extended_date" placeholder="August 2027" required>
        </div>
      </div>

      <div class="form-group">
        <label>Effective Month</label>
        <div class="date-wrap">
          <input type="month" id="effective_picker" class="date-picker">
          <input type="text" id="effective_display" name="effective_month" placeholder="August 2025" required>
        </div>
      </div>

      <hr class="form-divider">

      <div class="form-group">
        <label>Current CTC (LPA)</label>
        <input type="text" name="current_ctc_lpa" placeholder="2.76" required>
      </div>

      <div class="form-group">
        <label>New Monthly CTC (INR) - for salary breakup</label>
        <input type="number" id="ctc_monthly" name="ctc_monthly" placeholder="26750" min="1" required>
      </div>

      <div class="form-group">
        <label>Revised CTC (LPA) <span class="auto-badge">auto-calculated</span></label>
        <input type="text" id="increment_ctc_lpa" name="increment_ctc_lpa" placeholder="Fills from New Monthly CTC" readonly>
      </div>

      <div class="form-group">
        <label>Designation</label>
        <div id="desg-wrap" class="cdd-wrap"></div>
        <input type="hidden" id="designation-val" name="designation" required>
      </div>

    </div>
    <div class="btn-group">
      <button class="btn-generate" type="button" onclick="submitForm('/generate/contract/')">
        📄&nbsp; Download PDF
      </button>
      <button class="btn-generate-docx" type="button" onclick="submitForm('/generate/contract/docx/')">
        📝&nbsp; Download DOCX
      </button>
    </div>
    <script>
      function submitForm(url) {
        var form = document.getElementById('dl-form');
        form.action = url;
        form.submit();
      }
    </script>
  </form>
</div>

<script>
  // ── Reference No. (CRT + 3 digits) ──
  bindCRTRef(document.getElementById('ref-input'));

  initCDD({
    wrap:        document.getElementById('desg-wrap'),
    hiddenInput: document.getElementById('designation-val'),
    sessionKey:  'designations',
    placeholder: '— Select Designation —',
  });

  function toTitleCase(str) {
    return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1));
  }
  function bindTitleCase(name) {
    document.querySelectorAll(`[name="${name}"]`).forEach(el => {
      el.addEventListener('blur', () => { if (el.value) el.value = toTitleCase(el.value); });
    });
  }
  function bindUpperCase(name) {
    document.querySelectorAll(`[name="${name}"]`).forEach(el => {
      el.addEventListener('blur', () => { if (el.value) el.value = el.value.toUpperCase(); });
    });
  }

  function validateAddress(el) {
    if (!el.value) return;
    const v = el.value.trim();
    const valid = /^[^,\.]+(?:,\s[^,\.]+)*\.$/.test(v);
    let err = el.parentElement.querySelector('.addr-err');
    if (!valid) {
      if (!err) {
        err = document.createElement('p');
        err.className = 'addr-err';
        err.style.cssText = 'color:#b91c1c;font-size:0.8rem;margin-top:5px;font-family:inherit;';
        el.parentElement.appendChild(err);
      }
      err.textContent = '⚠ Format must be: 61, West Street, Pudhunagar, Pudhukkottai.  (comma-space between parts, ends with full stop)';
      el.style.borderColor = '#ef4444';
      el.style.boxShadow = '0 0 0 3px rgba(239,68,68,.15)';
    } else {
      if (err) err.remove();
      el.style.borderColor = '';
      el.style.boxShadow = '';
    }
  }
  const addrField = document.querySelector('[name="address"]');
  if (addrField) {
    addrField.addEventListener('blur',  () => validateAddress(addrField));
    addrField.addEventListener('input', () => {
      const err = addrField.parentElement.querySelector('.addr-err');
      if (err) err.remove();
      addrField.style.borderColor = '';
      addrField.style.boxShadow = '';
    });
  }
  ['name', 'address'].forEach(bindTitleCase);

  function fmy_date(s) {
    const d = new Date(s + 'T00:00:00'); if (isNaN(d)) return '';
    return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  }
  function fmy_month(s) {
    if (!s) return '';
    const [y,m] = s.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  }
  const ep = document.getElementById('extended_picker'), ed = document.getElementById('extended_display');
  const efp = document.getElementById('effective_picker'), efd = document.getElementById('effective_display');
  ep.addEventListener('change',  () => { ed.value  = fmy_date(ep.value);   }); ed.addEventListener('input',  () => { ep.value=''; });
  efp.addEventListener('change', () => { efd.value = fmy_month(efp.value); }); efd.addEventListener('input', () => { efp.value=''; });

  const ctcM = document.getElementById('ctc_monthly'), lpa = document.getElementById('increment_ctc_lpa');
  ctcM.addEventListener('input', () => {
    const m = parseFloat(ctcM.value);
    lpa.value = (!isNaN(m) && m > 0) ? (m * 12 / 100000).toFixed(2) : '';
  });
</script>
{% endblock %}
